name: Build & Deploy Tourya API to Cloud Run (Dev)

on:
  push:
    branches: [develop, feature/gcp-migration]

env:
  PROJECT_ID: tourya-project-dev
  REGION: us-east1
  SERVICE_NAME: tourya-dev-api
  PORT: 8088
  REGISTRY: us-east1-docker.pkg.dev/tourya-project-dev/tourya-dev

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_DEV }}'

      - name: Configure Docker
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --port=${{ env.PORT }}
            --service-account=tourya-dev-cloud-run@tourya-project-dev.iam.gserviceaccount.com
            --vpc-connector=tourya-dev-vpc-connector
            --min-instances=0
            --max-instances=2
            --memory=1Gi
            --cpu=1
            --timeout=300
            --allow-unauthenticated
          env_vars: |
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            STORAGE_PROVIDER=GCP
            GCS_BUCKET=tourya-dev-storage
            GCP_PROJECT_ID=tourya-project-dev
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_BUCKET=${{ secrets.AWS_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
